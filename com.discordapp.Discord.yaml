        url: https://stable.dl2.discordapp.net/distro/app/stable/linux/x64/1.0.141/discord_erlpack/1/full.distro
        sha256: 22b2ead67f7aae6d58135500fcfd9bf551f35f4f566b80d3f728f9c07872b67a
