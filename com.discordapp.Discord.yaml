      - type: file
        dest-filename: discord_desktop_core_module.tar.br
        url: https://stable.dl2.discordapp.net/distro/app/stable/linux/x64/1.0.145/discord_desktop_core/1/full.distro
        sha256: e7e0cdf183a20c60e4ad1fc918372bbcd9bca65ca998e071b24a8873fe297c1f
        x-checker-data:
