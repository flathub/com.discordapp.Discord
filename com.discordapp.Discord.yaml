        url: https://stable.dl2.discordapp.net/distro/app/stable/linux/x64/1.0.142/discord_erlpack/1/full.distro
        sha256: 15628a53ad3ef2ee565138a252666d39b142e1e39ff9724a9a862f24909a4280
